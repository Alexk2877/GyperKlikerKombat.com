<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 ВИРУСНЫЙ КЛИКЕР · РЕЙТИНГ ИГРОКОВ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0c1e 0%, #1a1e3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 8px;
            margin: 0;
        }
        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 22, 48, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 100, 0.3);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px #2e3466 inset, 0 0 20px #ffd96655;
            padding: 20px 16px 24px;
            transition: all 0.2s;
        }

        /* шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .title h1 {
            color: #ffe9a7;
            font-size: 1.9rem;
            font-weight: 900;
            text-shadow: 0 0 12px #ffb347, 0 4px 8px #00000050;
            letter-spacing: 1px;
            line-height: 1;
        }
        .title p {
            color: #aab5ff;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .online-badge {
            background: #2ed573;
            padding: 8px 12px;
            border-radius: 60px;
            box-shadow: 0 0 12px #2ed573aa;
            font-weight: 800;
            color: #0a1f0e;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            border: 1px solid #a3ffb0;
        }
        .online-badge span {
            background: white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: inline-block;
            box-shadow: 0 0 8px white;
            animation: pulse 1.8s infinite;
        }

        /* счёт */
        .score-panel {
            background: #0f1322dd;
            border-radius: 60px;
            padding: 12px 22px;
            margin: 8px 0 16px;
            border: 1px solid #ffd96666;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 2px 5px #00000055, 0 8px 12px #00000030;
        }
        .score-label {
            color: #b9c6ff;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .score-value {
            font-size: 3.2rem;
            font-weight: 900;
            color: #FFE484;
            text-shadow: 0 0 20px #ffb347, 0 2px 0 #7f5315;
            line-height: 1;
            letter-spacing: 2px;
        }
        .per-click {
            color: #a2f5a2;
            font-size: 1rem;
            font-weight: 600;
            background: #1f2a3f;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #64d888;
        }

        /* главная кнопка кликера */
        .clicker-area {
            display: flex;
            justify-content: center;
            margin: 12px 0 8px;
            position: relative;
        }
        .click-button {
            background: radial-gradient(circle at 30% 25%, #ffe694, #f7b32b);
            width: 200px;
            height: 200px;
            border-radius: 999px;
            box-shadow: 0 12px 0 #8b5e1a, 0 20px 30px #00000070, 0 0 30px #ffd966cc;
            border: 4px solid #fff3cf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.05s ease;
            cursor: pointer;
            touch-action: manipulation;
            color: #422b0c;
            font-weight: 900;
            font-size: 2.5rem;
            text-shadow: 0 2px 5px #ffeeaa;
            transform: translateY(-4px);
        }
        .click-button:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #6b4513, 0 15px 20px #00000070, 0 0 35px #ffc164;
        }
        .click-button small {
            font-size: 1rem;
            background: #2e1f0bb3;
            color: #fbe9b1;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
            backdrop-filter: blur(2px);
        }

        /* анимация +1 */
        .float-number {
            position: fixed;
            font-weight: 900;
            font-size: 2.2rem;
            color: #FFD966;
            text-shadow: 0 0 15px #ffae00, 0 4px 8px black;
            pointer-events: none;
            z-index: 999;
            animation: floatUp 0.9s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 0.8; transform: translateY(-70px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.6); }
        }

        /* улучшения */
        .upgrades {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 16px;
        }
        .upgrade-btn {
            flex: 1 1 40%;
            background: #202540;
            border: 2px solid #5664b0;
            border-radius: 40px;
            padding: 14px 6px;
            color: #f0e9d8;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 6px 0 #0f1322, 0 5px 10px black;
            transition: all 0.08s;
            cursor: pointer;
            text-align: center;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
        }
        .upgrade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1322, 0 5px 8px black;
        }
        .upgrade-btn.disabled {
            opacity: 0.5;
            filter: grayscale(0.7);
            pointer-events: none;
            border-color: #7e7e9a;
        }
        .upgrade-name {
            font-size: 1.1rem;
            display: block;
        }
        .upgrade-cost {
            color: #ffd966;
            font-size: 0.9rem;
        }

        /* рейтинг */
        .rating-section {
            background: #10142bb3;
            border-radius: 28px;
            padding: 16px 12px;
            backdrop-filter: blur(8px);
            border: 1px solid #f3cd8155;
            margin-top: 8px;
        }
        .rating-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffeab0;
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 12px;
            padding: 0 6px;
        }
        .rating-header i {
            font-size: 1rem;
            background: #2a2f55;
            padding: 6px 10px;
            border-radius: 30px;
            color: #bfd0ff;
        }
        .leaderboard {
            list-style: none;
            margin-bottom: 16px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .leaderboard li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1b2042cc;
            margin-bottom: 6px;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #7b8cdd33;
            color: #f0e9e0;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .player-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-rank {
            background: #e5b83c;
            color: #1e1a2e;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 0 8px #ffd966;
        }
        .player-score {
            background: #2a2f4e;
            padding: 6px 14px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 800;
        }

        .save-result {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .save-result input {
            flex: 2;
            background: #0b0e1e;
            border: 2px solid #6f7ec9;
            border-radius: 60px;
            padding: 14px 16px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            outline: none;
        }
        .save-result input::placeholder {
            color: #9ba4d9;
        }
        .save-result button {
            flex: 1;
            background: #3d4b9e;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            color: #ffefc0;
            font-size: 1rem;
            box-shadow: 0 5px 0 #1f2660;
            cursor: pointer;
            transition: 0.05s;
            border: 1px solid #b3beff;
            touch-action: manipulation;
            padding: 0 8px;
        }
        .save-result button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1f2660;
        }

        .footer-note {
            text-align: right;
            color: #8692c9;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ffd966; border-radius: 10px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">
            <h1>⚡CLICKER</h1>
            <p>ВИРУСНЫЙ РЕЙТИНГ</p>
        </div>
        <div class="online-badge">
            <span></span> 2.4K онлайн
        </div>
    </div>

    <div class="score-panel">
        <span class="score-label">💎 СЧЁТ</span>
        <span class="score-value" id="scoreDisplay">0</span>
        <span class="per-click" id="clickPowerDisplay">+1/клик</span>
    </div>

    <div class="clicker-area">
        <div class="click-button" id="clickButton">
            💰<br>
            <small>ТАПАЙ</small>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade-btn" id="upgradeClickBtn">
            <span class="upgrade-name">🔨 УСИЛЕНИЕ</span>
            <span class="upgrade-cost" id="upgradeClickCost">100 💎</span>
        </div>
        <div class="upgrade-btn" id="buyAutoClickerBtn">
            <span class="upgrade-name">🤖 АВТО-КЛИК</span>
            <span class="upgrade-cost" id="autoClickerCost">250 💎</span>
        </div>
    </div>

    <div class="rating-section">
        <div class="rating-header">
            🏆 РЕЙТИНГ ИГРОКОВ
            <i>🌍 ТОП-10</i>
        </div>
        <ul class="leaderboard" id="leaderboardList">
            <!-- динамически заполняется -->
        </ul>

        <div class="save-result">
            <input type="text" id="playerNameInput" placeholder="ТВОЁ ИМЯ" maxlength="14" autocomplete="off">
            <button id="saveScoreBtn">📤 СОХРАНИТЬ</button>
        </div>
        <div class="footer-note" id="messageHint">🔥 твой рекорд будет в рейтинге!</div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- СОСТОЯНИЕ ИГРЫ -----
        let score = 0;
        let clickPower = 1;            // очков за клик
        let autoClickerLevel = 0;
        let autoClickerPower = 1;      // очков в секунду за каждый уровень
        let upgradeClickLevel = 0;
        
        // Базовая стоимость улучшений
        const BASE_CLICK_UPGRADE_COST = 100;
        const BASE_AUTO_COST = 250;
        
        // Множители стоимости
        const CLICK_COST_MULTIPLIER = 1.8;
        const AUTO_COST_MULTIPLIER = 2.0;

        // DOM элементы
        const scoreDisplay = document.getElementById('scoreDisplay');
        const clickPowerDisplay = document.getElementById('clickPowerDisplay');
        const clickButton = document.getElementById('clickButton');
        const upgradeClickBtn = document.getElementById('upgradeClickBtn');
        const upgradeClickCostSpan = document.getElementById('upgradeClickCost');
        const buyAutoClickerBtn = document.getElementById('buyAutoClickerBtn');
        const autoClickerCostSpan = document.getElementById('autoClickerCost');
        const leaderboardList = document.getElementById('leaderboardList');
        const playerNameInput = document.getElementById('playerNameInput');
        const saveScoreBtn = document.getElementById('saveScoreBtn');
        const messageHint = document.getElementById('messageHint');

        // ----- РЕЙТИНГ: боты + локальные игроки -----
        let globalLeaderboard = [];       // объединённый массив { name, score, isLocal }
        
        // Имена для ботов (настоящие игроки)
        const BOT_NAMES = [
            "ProTapper", "ClickMaster", "NoobSlayer", "LuckyCoin", "FastFinger",
            "xX_Destroyer_Xx", "MegaClick", "CoinGod", "TapWizard", "SleepyJoe",
            "NightWolf", "CyberCat", "Banan4ik", "KlikKlak", "SweatyHands"
        ];

        // ----- ЛОКАЛЬНОЕ ХРАНИЛИЩЕ -----
        const STORAGE_KEYS = {
            GAME: 'viralClickerGame',
            LOCAL_PLAYERS: 'viralClickerLocalPlayers'
        };

        // Загрузка прогресса игры
        function loadGameProgress() {
            const saved = localStorage.getItem(STORAGE_KEYS.GAME);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    score = data.score || 0;
                    clickPower = data.clickPower || 1;
                    autoClickerLevel = data.autoClickerLevel || 0;
                    upgradeClickLevel = data.upgradeClickLevel || 0;
                } catch(e) {}
            }
            updateUI();
        }

        // Сохранение прогресса
        function saveGameProgress() {
            const data = {
                score, clickPower, autoClickerLevel, upgradeClickLevel
            };
            localStorage.setItem(STORAGE_KEYS.GAME, JSON.stringify(data));
        }

        // Загрузка локальных игроков (из localStorage)
        function loadLocalPlayers() {
            const stored = localStorage.getItem(STORAGE_KEYS.LOCAL_PLAYERS);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch(e){}
            }
            return [];
        }

        // Сохранение локальных игроков
        function saveLocalPlayers(players) {
            localStorage.setItem(STORAGE_KEYS.LOCAL_PLAYERS, JSON.stringify(players));
        }

        // Генерация ботов (каждый раз при обновлении рейтинга)
        function generateBots() {
            const bots = [];
            const count = 6 + Math.floor(Math.random() * 5); // 6-10 ботов
            for (let i=0; i<count; i++) {
                const name = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] + (Math.floor(Math.random()*100));
                // очки от 800 до 15000 (зависит от "опыта")
                const botScore = Math.floor(800 + Math.random() * 18000);
                bots.push({ name, score: botScore, isLocal: false });
            }
            // сортируем по убыванию
            bots.sort((a,b) => b.score - a.score);
            return bots;
        }

        // Обновление таблицы лидеров (боты + локальные)
        function updateLeaderboard() {
            const localPlayers = loadLocalPlayers(); // массив { name, score }
            const bots = generateBots();
            
            // Объединяем
            let combined = [...bots, ...localPlayers.map(p => ({ ...p, isLocal: true }))];
            // Сортируем по очкам
            combined.sort((a,b) => b.score - a.score);
            // Топ-10
            globalLeaderboard = combined.slice(0, 10);
            
            // Рендер
            leaderboardList.innerHTML = '';
            globalLeaderboard.forEach((entry, idx) => {
                const li = document.createElement('li');
                const rankSpan = document.createElement('span');
                rankSpan.className = 'player-rank';
                rankSpan.textContent = idx+1;
                
                const nameSpan = document.createElement('span');
                nameSpan.style.marginLeft = '8px';
                nameSpan.style.flex = '1';
                let displayName = entry.name;
                if (entry.isLocal) displayName += ' 👤';
                else displayName += ' 🌟';
                nameSpan.textContent = displayName;
                
                const scoreSpan = document.createElement('span');
                scoreSpan.className = 'player-score';
                scoreSpan.textContent = Math.floor(entry.score).toLocaleString();
                
                const leftDiv = document.createElement('div');
                leftDiv.className = 'player-name';
                leftDiv.appendChild(rankSpan);
                leftDiv.appendChild(nameSpan);
                
                li.appendChild(leftDiv);
                li.appendChild(scoreSpan);
                leaderboardList.appendChild(li);
            });
        }

        // Добавление / обновление результата локального игрока
        function savePlayerScore(playerName) {
            if (!playerName || playerName.trim() === '') {
                messageHint.textContent = '❌ Введи имя!';
                return false;
            }
            const trimmed = playerName.trim().substring(0, 14);
            const currentScore = Math.floor(score);
            
            let localPlayers = loadLocalPlayers();
            // Проверяем, есть ли уже игрок с таким именем
            const existingIndex = localPlayers.findIndex(p => p.name.toLowerCase() === trimmed.toLowerCase());
            if (existingIndex !== -1) {
                // обновляем только если новый счёт больше
                if (currentScore > localPlayers[existingIndex].score) {
                    localPlayers[existingIndex].score = currentScore;
                    messageHint.textContent = `✨ ${trimmed} обновил рекорд!`;
                } else {
                    messageHint.textContent = `⏳ ${trimmed} уже в рейтинге (счёт ${localPlayers[existingIndex].score})`;
                    // но всё равно обновим отображение (вдруг счёт изменился)
                }
            } else {
                // добавляем нового
                localPlayers.push({ name: trimmed, score: currentScore });
                messageHint.textContent = `🚀 ${trimmed} в топе!`;
            }
            
            // Ограничим количество локальных записей (оставляем последние 20)
            if (localPlayers.length > 20) {
                localPlayers = localPlayers.slice(-20);
            }
            saveLocalPlayers(localPlayers);
            updateLeaderboard();
            return true;
        }

        // ----- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА (стоимости, кнопки) -----
        function getClickUpgradeCost() {
            return Math.floor(BASE_CLICK_UPGRADE_COST * Math.pow(CLICK_COST_MULTIPLIER, upgradeClickLevel));
        }

        function getAutoClickerCost() {
            return Math.floor(BASE_AUTO_COST * Math.pow(AUTO_COST_MULTIPLIER, autoClickerLevel));
        }

        function updateUI() {
            scoreDisplay.textContent = Math.floor(score).toLocaleString();
            clickPowerDisplay.textContent = `+${clickPower}/клик`;
            
            const clickCost = getClickUpgradeCost();
            upgradeClickCostSpan.textContent = `${clickCost} 💎`;
            if (score < clickCost) {
                upgradeClickBtn.classList.add('disabled');
            } else {
                upgradeClickBtn.classList.remove('disabled');
            }
            
            const autoCost = getAutoClickerCost();
            autoClickerCostSpan.textContent = `${autoCost} 💎`;
            if (score < autoCost) {
                buyAutoClickerBtn.classList.add('disabled');
            } else {
                buyAutoClickerBtn.classList.remove('disabled');
            }
            
            // текст улучшения
            const upgradeNameSpan = upgradeClickBtn.querySelector('.upgrade-name');
            upgradeNameSpan.textContent = `🔨 УСИЛЕНИЕ (ур.${upgradeClickLevel})`;
            
            const autoNameSpan = buyAutoClickerBtn.querySelector('.upgrade-name');
            autoNameSpan.textContent = `🤖 АВТО-КЛИК (ур.${autoClickerLevel})`;
        }

        // ----- МЕХАНИКИ -----
        function addScore(amount) {
            score += amount;
            updateUI();
            saveGameProgress();
        }

        function spendScore(amount) {
            if (score >= amount) {
                score -= amount;
                updateUI();
                saveGameProgress();
                return true;
            }
            return false;
        }

        // Клик
        function handleClick(e) {
            addScore(clickPower);
            // Визуальный эффект +число
            createFloatingNumber(e, `+${clickPower}`);
            
            // небольшая вибрация (если поддерживается)
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function createFloatingNumber(event, text) {
            const floatEl = document.createElement('div');
            floatEl.className = 'float-number';
            floatEl.textContent = text;
            
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            floatEl.style.left = (clientX - 20) + 'px';
            floatEl.style.top = (clientY - 30) + 'px';
            document.body.appendChild(floatEl);
            
            setTimeout(() => { floatEl.remove(); }, 900);
        }

        // Покупка улучшения клика
        function buyClickUpgrade() {
            const cost = getClickUpgradeCost();
            if (spendScore(cost)) {
                clickPower += 1;
                upgradeClickLevel++;
                updateUI();
                messageHint.textContent = `⚡ Сила клика +1!`;
            } else {
                messageHint.textContent = `😕 Не хватает 💎`;
            }
        }

        // Покупка авто-кликера
        function buyAutoClicker() {
            const cost = getAutoClickerCost();
            if (spendScore(cost)) {
                autoClickerLevel++;
                updateUI();
                messageHint.textContent = `🤖 Автокликер ур.${autoClickerLevel}`;
            } else {
                messageHint.textContent = `😕 Нужно больше 💎`;
            }
        }

        // Автоматический доход
        function autoClickerTick() {
            if (autoClickerLevel > 0) {
                // каждый уровень даёт autoClickerPower очков в секунду
                const gain = autoClickerLevel * autoClickerPower;
                addScore(gain);
                // тихий эффект (не мешает)
            }
        }

        // ----- ИНИЦИАЛИЗАЦИЯ И ПОДПИСКИ -----
        function init() {
            loadGameProgress();
            updateLeaderboard();  // первое построение рейтинга
            updateUI();
            
            // Интервал авто-кликера (каждую секунду)
            setInterval(() => {
                autoClickerTick();
            }, 1000);
            
            // Обработчики
            clickButton.addEventListener('click', handleClick);
            clickButton.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleClick(e);
            }, {passive: false});
            
            upgradeClickBtn.addEventListener('click', (e) => {
                buyClickUpgrade();
            });
            
            buyAutoClickerBtn.addEventListener('click', (e) => {
                buyAutoClicker();
            });
            
            saveScoreBtn.addEventListener('click', () => {
                const name = playerNameInput.value.trim();
                if (name) {
                    savePlayerScore(name);
                    playerNameInput.value = '';
                } else {
                    messageHint.textContent = '📛 Введи имя!';
                }
            });
            
            // Ручное обновление рейтинга каждые 20 секунд (чтобы боты "играли")
            setInterval(() => {
                updateLeaderboard();
            }, 22000);
            
            // При изменении счёта иногда можно подсказывать
            // Сохраняем игру при уходе со страницы
            window.addEventListener('beforeunload', () => {
                saveGameProgress();
            });
            
            // стартовое сообщение
            messageHint.textContent = '🔥 Тапай и попади в ТОП!';
        }

        init();
    })();
</script>
</body>
</html>
