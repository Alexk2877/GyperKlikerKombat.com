<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 ВИРУСНЫЙ КЛИКЕР · СКИНЫ И ДОСТИЖЕНИЯ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0c1e 0%, #1a1e3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 8px;
            margin: 0;
        }
        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 22, 48, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 100, 0.3);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px #2e3466 inset, 0 0 20px #ffd96655;
            padding: 20px 16px 24px;
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .title h1 {
            color: #ffe9a7;
            font-size: 1.9rem;
            font-weight: 900;
            text-shadow: 0 0 12px #ffb347, 0 4px 8px #00000050;
            letter-spacing: 1px;
            line-height: 1;
        }
        .title p {
            color: #aab5ff;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .online-badge {
            background: #2ed573;
            padding: 8px 12px;
            border-radius: 60px;
            box-shadow: 0 0 12px #2ed573aa;
            font-weight: 800;
            color: #0a1f0e;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            border: 1px solid #a3ffb0;
        }
        .online-badge span {
            background: white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            display: inline-block;
            box-shadow: 0 0 8px white;
            animation: pulse 1.8s infinite;
        }

        .score-panel {
            background: #0f1322dd;
            border-radius: 60px;
            padding: 12px 22px;
            margin: 8px 0 16px;
            border: 1px solid #ffd96666;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 2px 5px #00000055, 0 8px 12px #00000030;
        }
        .score-label {
            color: #b9c6ff;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .score-value {
            font-size: 2.8rem;
            font-weight: 900;
            color: #FFE484;
            text-shadow: 0 0 20px #ffb347, 0 2px 0 #7f5315;
            line-height: 1;
            letter-spacing: 2px;
        }
        .per-click {
            color: #a2f5a2;
            font-size: 1rem;
            font-weight: 600;
            background: #1f2a3f;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #64d888;
        }

        .clicker-area {
            display: flex;
            justify-content: center;
            margin: 12px 0 8px;
            position: relative;
        }
        /* Базовый стиль кнопки — будет переопределяться скинами через классы */
        .click-button {
            width: 200px;
            height: 200px;
            border-radius: 999px;
            box-shadow: 0 12px 0 #8b5e1a, 0 20px 30px #00000070, 0 0 30px #ffd966cc;
            border: 4px solid #fff3cf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.05s ease;
            cursor: pointer;
            touch-action: manipulation;
            color: #422b0c;
            font-weight: 900;
            font-size: 2.5rem;
            text-shadow: 0 2px 5px #ffeeaa;
            transform: translateY(-4px);
        }
        .click-button:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #6b4513, 0 15px 20px #00000070, 0 0 35px #ffc164;
        }
        .click-button small {
            font-size: 1rem;
            background: #2e1f0bb3;
            color: #fbe9b1;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
            backdrop-filter: blur(2px);
        }

        /* Скины кнопки */
        .skin-gold {
            background: radial-gradient(circle at 30% 25%, #ffe694, #f7b32b);
            box-shadow: 0 12px 0 #8b5e1a, 0 20px 30px #00000070, 0 0 30px #ffd966cc;
            border: 4px solid #fff3cf;
        }
        .skin-emerald {
            background: radial-gradient(circle at 30% 25%, #a3e0a0, #2e8b57);
            box-shadow: 0 12px 0 #1b4d2e, 0 20px 30px #00000070, 0 0 30px #6fda6f;
            border: 4px solid #c6ffc1;
            color: #e2ffe0;
            text-shadow: 0 2px 5px #1e4a1e;
        }
        .skin-fire {
            background: radial-gradient(circle at 30% 25%, #ffb347, #d9531e);
            box-shadow: 0 12px 0 #a1300e, 0 20px 30px #00000070, 0 0 35px #ff7b24;
            border: 4px solid #ffc285;
            color: #fff3e0;
            text-shadow: 0 2px 5px #7f2a00;
        }
        .skin-ice {
            background: radial-gradient(circle at 30% 25%, #b7e4ff, #3a86c4);
            box-shadow: 0 12px 0 #1c4b77, 0 20px 30px #00000070, 0 0 30px #8ecae6;
            border: 4px solid #d4f1ff;
            color: #0a1e2c;
            text-shadow: 0 2px 5px #b3defa;
        }
        .skin-dark {
            background: radial-gradient(circle at 30% 25%, #7a7a9a, #2d2d4a);
            box-shadow: 0 12px 0 #19192e, 0 20px 30px #00000070, 0 0 35px #9f7aea;
            border: 4px solid #b9adff;
            color: #e0d6ff;
            text-shadow: 0 2px 5px #2f1f5e;
        }

        .float-number {
            position: fixed;
            font-weight: 900;
            font-size: 2.2rem;
            color: #FFD966;
            text-shadow: 0 0 15px #ffae00, 0 4px 8px black;
            pointer-events: none;
            z-index: 999;
            animation: floatUp 0.9s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 0.8; transform: translateY(-70px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.6); }
        }

        .upgrades {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 16px;
        }
        .upgrade-btn {
            flex: 1 1 40%;
            background: #202540;
            border: 2px solid #5664b0;
            border-radius: 40px;
            padding: 14px 6px;
            color: #f0e9d8;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 6px 0 #0f1322, 0 5px 10px black;
            transition: all 0.08s;
            cursor: pointer;
            text-align: center;
            touch-action: manipulation;
            backdrop-filter: blur(4px);
        }
        .upgrade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1322, 0 5px 8px black;
        }
        .upgrade-btn.disabled {
            opacity: 0.5;
            filter: grayscale(0.7);
            pointer-events: none;
            border-color: #7e7e9a;
        }
        .upgrade-name {
            font-size: 1.1rem;
            display: block;
        }
        .upgrade-cost {
            color: #ffd966;
            font-size: 0.9rem;
        }

        /* Секция скинов */
        .skins-section {
            margin: 8px 0 16px;
            background: #0f1322bb;
            border-radius: 30px;
            padding: 14px 12px;
            border: 1px solid #b4945066;
        }
        .section-title {
            color: #ffeab0;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
        }
        .skin-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .skin-item {
            flex: 0 0 auto;
            background: #1d2340;
            border-radius: 50px;
            padding: 8px 14px;
            border: 2px solid #5e6db3;
            color: #f3e3b0;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 85px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 #0e1225;
        }
        .skin-item.active {
            border: 3px solid #ffd966;
            background: #2e3860;
            box-shadow: 0 0 15px #ffbf00;
            transform: scale(1.02);
        }
        .skin-item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0e1225;
        }
        .skin-emoji {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .skin-price {
            font-size: 0.8rem;
            color: #a2f5a2;
        }

        /* Достижения */
        .achievements-section {
            background: #10142bb3;
            border-radius: 28px;
            padding: 16px 12px;
            backdrop-filter: blur(8px);
            border: 1px solid #f3cd8155;
            margin: 8px 0;
        }
        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .achievement-item {
            background: #1b2042cc;
            border-radius: 30px;
            padding: 10px 14px;
            border: 1px solid #7b8cdd33;
        }
        .achieve-header {
            display: flex;
            justify-content: space-between;
            color: #ffeaaf;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .progress-bar-bg {
            background: #0f1322;
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px black;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f3cd81, #ffd966);
            border-radius: 20px;
            box-shadow: 0 0 8px #ffd966;
            transition: width 0.2s;
        }
        .achieve-reward {
            font-size: 0.8rem;
            color: #a2f5a2;
            margin-top: 5px;
        }

        .rating-section {
            background: #10142bb3;
            border-radius: 28px;
            padding: 16px 12px;
            backdrop-filter: blur(8px);
            border: 1px solid #f3cd8155;
            margin-top: 8px;
        }
        .rating-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffeab0;
            font-weight: 800;
            font-size: 1.3rem;
            margin-bottom: 12px;
            padding: 0 6px;
        }
        .leaderboard {
            list-style: none;
            margin-bottom: 16px;
            max-height: 180px;
            overflow-y: auto;
        }
        .leaderboard li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1b2042cc;
            margin-bottom: 6px;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #7b8cdd33;
            color: #f0e9e0;
            font-weight: 600;
        }
        .player-name { display: flex; align-items: center; gap: 10px; }
        .player-rank {
            background: #e5b83c;
            color: #1e1a2e;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }
        .player-score {
            background: #2a2f4e;
            padding: 6px 14px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: 800;
        }

        .save-result {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .save-result input {
            flex: 2;
            background: #0b0e1e;
            border: 2px solid #6f7ec9;
            border-radius: 60px;
            padding: 14px 16px;
            color: white;
            font-weight: 600;
            outline: none;
        }
        .save-result button {
            flex: 1;
            background: #3d4b9e;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            color: #ffefc0;
            box-shadow: 0 5px 0 #1f2660;
            cursor: pointer;
            border: 1px solid #b3beff;
            padding: 0 8px;
        }

        .footer-note { text-align: right; color: #8692c9; font-size: 0.7rem; margin-top: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ffd966; border-radius: 10px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">
            <h1>⚡CLICKER</h1>
            <p>ВИРУСНЫЙ РЕЙТИНГ</p>
        </div>
        <div class="online-badge"><span></span> 2.4K онлайн</div>
    </div>

    <div class="score-panel">
        <span class="score-label">💎 СЧЁТ</span>
        <span class="score-value" id="scoreDisplay">0</span>
        <span class="per-click" id="clickPowerDisplay">+1/клик</span>
    </div>

    <div class="clicker-area">
        <div class="click-button skin-gold" id="clickButton">
            💰<br><small>ТАПАЙ</small>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade-btn" id="upgradeClickBtn">
            <span class="upgrade-name">🔨 УСИЛЕНИЕ</span>
            <span class="upgrade-cost" id="upgradeClickCost">100 💎</span>
        </div>
        <div class="upgrade-btn" id="buyAutoClickerBtn">
            <span class="upgrade-name">🤖 АВТО-КЛИК</span>
            <span class="upgrade-cost" id="autoClickerCost">250 💎</span>
        </div>
    </div>

    <!-- НОВОЕ: Скины -->
    <div class="skins-section">
        <div class="section-title"><span>🎨 СКИНЫ МОНЕТКИ</span></div>
        <div class="skin-list" id="skinContainer"></div>
    </div>

    <!-- НОВОЕ: Достижения -->
    <div class="achievements-section">
        <div class="section-title"><span>🏆 ДОСТИЖЕНИЯ</span></div>
        <div class="achievement-list" id="achievementsContainer"></div>
    </div>

    <div class="rating-section">
        <div class="rating-header">🏆 РЕЙТИНГ ИГРОКОВ <i>🌍 ТОП-10</i></div>
        <ul class="leaderboard" id="leaderboardList"></ul>
        <div class="save-result">
            <input type="text" id="playerNameInput" placeholder="ТВОЁ ИМЯ" maxlength="14">
            <button id="saveScoreBtn">📤 СОХРАНИТЬ</button>
        </div>
        <div class="footer-note" id="messageHint">🔥 твой рекорд будет в рейтинге!</div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // --- СОСТОЯНИЕ ---
        let score = 0;
        let clickPower = 1;
        let autoClickerLevel = 0;
        let autoClickerPower = 1;
        let upgradeClickLevel = 0;
        let totalClicks = 0;        // для достижений

        // Скины
        const SKINS = [
            { id: 'gold', name: 'Золото', emoji: '🪙', baseCost: 0, class: 'skin-gold' },
            { id: 'emerald', name: 'Изумруд', emoji: '💚', baseCost: 500, class: 'skin-emerald' },
            { id: 'fire', name: 'Огонь', emoji: '🔥', baseCost: 1500, class: 'skin-fire' },
            { id: 'ice', name: 'Лёд', emoji: '❄️', baseCost: 3000, class: 'skin-ice' },
            { id: 'dark', name: 'Тьма', emoji: '🌑', baseCost: 8000, class: 'skin-dark' }
        ];
        let ownedSkins = ['gold'];      // всегда есть золотой
        let activeSkinId = 'gold';

        // Достижения (id, описание, цель, награда (добавка к clickPower))
        const ACHIEVEMENTS = [
            { id: 'click10', desc: '10 кликов', target: 10, reward: 0.5, progress: 0, claimed: false },
            { id: 'click100', desc: '100 кликов', target: 100, reward: 1, progress: 0, claimed: false },
            { id: 'click1000', desc: '1000 кликов', target: 1000, reward: 2, progress: 0, claimed: false },
            { id: 'score1k', desc: 'Накопить 1K 💎', target: 1000, reward: 1, progress: 0, claimed: false },
            { id: 'score10k', desc: 'Накопить 10K 💎', target: 10000, reward: 3, progress: 0, claimed: false },
            { id: 'score100k', desc: 'Накопить 100K 💎', target: 100000, reward: 5, progress: 0, claimed: false },
            { id: 'auto3', desc: '3 автокликера', target: 3, reward: 2, progress: 0, claimed: false },
            { id: 'auto6', desc: '6 автокликеров', target: 6, reward: 4, progress: 0, claimed: false }
        ];
        let achievements = [];

        const BASE_CLICK_COST = 100;
        const BASE_AUTO_COST = 250;
        const CLICK_MULT = 1.8;
        const AUTO_MULT = 2.0;

        // DOM
        const scoreDisplay = document.getElementById('scoreDisplay');
        const clickPowerDisplay = document.getElementById('clickPowerDisplay');
        const clickButton = document.getElementById('clickButton');
        const upgradeClickBtn = document.getElementById('upgradeClickBtn');
        const upgradeClickCostSpan = document.getElementById('upgradeClickCost');
        const buyAutoClickerBtn = document.getElementById('buyAutoClickerBtn');
        const autoClickerCostSpan = document.getElementById('autoClickerCost');
        const leaderboardList = document.getElementById('leaderboardList');
        const playerNameInput = document.getElementById('playerNameInput');
        const saveScoreBtn = document.getElementById('saveScoreBtn');
        const messageHint = document.getElementById('messageHint');
        const skinContainer = document.getElementById('skinContainer');
        const achievementsContainer = document.getElementById('achievementsContainer');

        // Рейтинг
        const BOT_NAMES = ["ProTapper","ClickMaster","LuckyCoin","FastFinger","MegaClick","CoinGod","TapWizard","SleepyJoe","NightWolf","CyberCat","KlikKlak"];

        // Хранилище
        const STORAGE_GAME = 'viralClickerGame_v2';
        const STORAGE_LOCAL = 'viralClickerLocalPlayers_v2';

        // --- ИНИЦИАЛИЗАЦИЯ ДАННЫХ ---
        function loadGame() {
            const saved = localStorage.getItem(STORAGE_GAME);
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    score = d.score || 0;
                    clickPower = d.clickPower || 1;
                    autoClickerLevel = d.autoClickerLevel || 0;
                    upgradeClickLevel = d.upgradeClickLevel || 0;
                    totalClicks = d.totalClicks || 0;
                    ownedSkins = d.ownedSkins || ['gold'];
                    activeSkinId = d.activeSkinId || 'gold';
                    achievements = d.achievements || JSON.parse(JSON.stringify(ACHIEVEMENTS));
                } catch(e){}
            } else {
                achievements = JSON.parse(JSON.stringify(ACHIEVEMENTS));
            }
            applySkin(activeSkinId);
            updateUI();
        }

        function saveGame() {
            const data = { score, clickPower, autoClickerLevel, upgradeClickLevel, totalClicks, ownedSkins, activeSkinId, achievements };
            localStorage.setItem(STORAGE_GAME, JSON.stringify(data));
        }

        function loadLocalPlayers() {
            const stored = localStorage.getItem(STORAGE_LOCAL);
            return stored ? JSON.parse(stored) : [];
        }

        function saveLocalPlayers(players) { localStorage.setItem(STORAGE_LOCAL, JSON.stringify(players)); }

        function generateBots() {
            const bots = [];
            for (let i=0; i<7; i++) {
                const name = BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)] + Math.floor(Math.random()*100);
                bots.push({ name, score: Math.floor(800 + Math.random()*18000), isLocal: false });
            }
            return bots.sort((a,b)=>b.score-a.score);
        }

        function updateLeaderboard() {
            const locals = loadLocalPlayers().map(p=>({...p, isLocal:true}));
            const combined = [...generateBots(), ...locals].sort((a,b)=>b.score-a.score).slice(0,10);
            leaderboardList.innerHTML = '';
            combined.forEach((e,i)=>{
                const li = document.createElement('li');
                li.innerHTML = `<div class="player-name"><span class="player-rank">${i+1}</span><span>${e.name}${e.isLocal?' 👤':' 🌟'}</span></div><span class="player-score">${Math.floor(e.score).toLocaleString()}</span>`;
                leaderboardList.appendChild(li);
            });
        }

        // --- СКИНЫ ---
        function renderSkins() {
            skinContainer.innerHTML = '';
            SKINS.forEach(skin => {
                const owned = ownedSkins.includes(skin.id);
                const isActive = activeSkinId === skin.id;
                const cost = skin.baseCost;
                const div = document.createElement('div');
                div.className = `skin-item ${isActive ? 'active' : ''}`;
                div.innerHTML = `<div class="skin-emoji">${skin.emoji}</div><div>${skin.name}</div>`;
                if (!owned) {
                    div.innerHTML += `<div class="skin-price">${cost} 💎</div>`;
                } else {
                    div.innerHTML += `<div class="skin-price">✔️ есть</div>`;
                }
                div.addEventListener('click', (e) => {
                    if (!ownedSkins.includes(skin.id)) {
                        if (score >= cost) {
                            score -= cost;
                            ownedSkins.push(skin.id);
                            messageHint.textContent = `Скин "${skin.name}" куплен!`;
                            renderSkins();
                            updateUI();
                            saveGame();
                        } else {
                            messageHint.textContent = `Не хватает 💎 для скина`;
                        }
                    } else {
                        // сменить активный
                        activeSkinId = skin.id;
                        applySkin(skin.id);
                        renderSkins();
                        saveGame();
                        messageHint.textContent = `Скин "${skin.name}" надет`;
                    }
                    updateLeaderboard(); // не обязательно, но для единообразия
                });
                skinContainer.appendChild(div);
            });
        }

        function applySkin(skinId) {
            const skin = SKINS.find(s=>s.id===skinId);
            if (!skin) return;
            // Удаляем все скин-классы и добавляем нужный
            clickButton.className = 'click-button ' + skin.class;
        }

        // --- ДОСТИЖЕНИЯ ---
        function checkAchievements() {
            let updated = false;
            achievements.forEach(ach => {
                if (ach.claimed) return;
                let current = 0;
                if (ach.id.startsWith('click')) current = totalClicks;
                else if (ach.id.startsWith('score')) current = score;
                else if (ach.id.startsWith('auto')) current = autoClickerLevel;
                ach.progress = Math.min(current, ach.target);
                if (current >= ach.target && !ach.claimed) {
                    ach.claimed = true;
                    clickPower += ach.reward;
                    messageHint.textContent = `🏆 ${ach.desc} выполнено! +${ach.reward} к силе`;
                    updated = true;
                }
            });
            if (updated) { updateUI(); saveGame(); }
            renderAchievements();
        }

        function renderAchievements() {
            achievementsContainer.innerHTML = '';
            achievements.forEach(ach => {
                const percent = (ach.progress / ach.target)*100;
                const div = document.createElement('div');
                div.className = 'achievement-item';
                div.innerHTML = `
                    <div class="achieve-header"><span>${ach.desc}</span><span>${ach.progress}/${ach.target}</span></div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%;"></div></div>
                    <div class="achieve-reward">${ach.claimed ? '✅ +'+ach.reward+' силы' : '🔒 награда: +'+ach.reward+' клик'}</div>
                `;
                achievementsContainer.appendChild(div);
            });
        }

        // --- ОБНОВЛЕНИЕ UI ---
        function getClickUpgradeCost() { return Math.floor(BASE_CLICK_COST * Math.pow(CLICK_MULT, upgradeClickLevel)); }
        function getAutoCost() { return Math.floor(BASE_AUTO_COST * Math.pow(AUTO_MULT, autoClickerLevel)); }

        function updateUI() {
            scoreDisplay.textContent = Math.floor(score).toLocaleString();
            clickPowerDisplay.textContent = `+${clickPower}/клик`;
            const clickCost = getClickUpgradeCost();
            upgradeClickCostSpan.textContent = `${clickCost} 💎`;
            upgradeClickBtn.classList.toggle('disabled', score < clickCost);
            const autoCost = getAutoCost();
            autoClickerCostSpan.textContent = `${autoCost} 💎`;
            buyAutoClickerBtn.classList.toggle('disabled', score < autoCost);
            upgradeClickBtn.querySelector('.upgrade-name').textContent = `🔨 УСИЛЕНИЕ (ур.${upgradeClickLevel})`;
            buyAutoClickerBtn.querySelector('.upgrade-name').textContent = `🤖 АВТО-КЛИК (ур.${autoClickerLevel})`;
            checkAchievements();
        }

        function addScore(amount) {
            score += amount;
            updateUI();
            saveGame();
        }

        function spend(amount) { if(score>=amount) { score-=amount; updateUI(); saveGame(); return true; } return false; }

        function handleClick(e) {
            totalClicks++;
            addScore(clickPower);
            createFloatingNumber(e, `+${clickPower}`);
            if (navigator.vibrate) navigator.vibrate(5);
            checkAchievements();
        }

        function createFloatingNumber(event, text) {
            const el = document.createElement('div'); el.className='float-number'; el.textContent=text;
            const x = event.touches ? event.touches[0].clientX : event.clientX;
            const y = event.touches ? event.touches[0].clientY : event.clientY;
            el.style.left = (x-20)+'px'; el.style.top = (y-30)+'px';
            document.body.appendChild(el); setTimeout(()=>el.remove(),900);
        }

        function buyClickUpgrade() {
            const cost = getClickUpgradeCost();
            if(spend(cost)) { clickPower+=1; upgradeClickLevel++; messageHint.textContent='⚡ Сила клика +1!'; updateUI(); }
            else messageHint.textContent='😕 Не хватает 💎';
        }

        function buyAutoClicker() {
            const cost = getAutoCost();
            if(spend(cost)) { autoClickerLevel++; messageHint.textContent=`🤖 Автокликер ур.${autoClickerLevel}`; updateUI(); }
            else messageHint.textContent='😕 Нужно больше 💎';
        }

        function autoTick() { if(autoClickerLevel>0) addScore(autoClickerLevel * autoClickerPower); }

        // Сохранение в рейтинг
        function savePlayerScore() {
            const name = playerNameInput.value.trim();
            if(!name) { messageHint.textContent='❌ Введи имя!'; return; }
            const trimmed = name.substring(0,14);
            let locals = loadLocalPlayers();
            const existing = locals.findIndex(p=>p.name.toLowerCase()===trimmed.toLowerCase());
            const currentScore = Math.floor(score);
            if(existing!==-1) {
                if(currentScore > locals[existing].score) { locals[existing].score = currentScore; messageHint.textContent=`✨ ${trimmed} обновил рекорд!`; }
                else { messageHint.textContent=`⏳ ${trimmed} уже в рейтинге`; }
            } else {
                locals.push({name:trimmed, score:currentScore}); messageHint.textContent=`🚀 ${trimmed} в топе!`;
            }
            if(locals.length>20) locals=locals.slice(-20);
            saveLocalPlayers(locals);
            updateLeaderboard();
            playerNameInput.value = '';
        }

        // Инициализация
        function init() {
            loadGame();
            renderSkins();
            renderAchievements();
            updateLeaderboard();
            setInterval(autoTick, 1000);
            setInterval(updateLeaderboard, 22000);
            clickButton.addEventListener('click', handleClick);
            clickButton.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleClick(e); }, {passive:false});
            upgradeClickBtn.addEventListener('click', buyClickUpgrade);
            buyAutoClickerBtn.addEventListener('click', buyAutoClicker);
            saveScoreBtn.addEventListener('click', savePlayerScore);
            window.addEventListener('beforeunload', saveGame);
            messageHint.textContent = '🔥 Тапай, копи скины и достижения!';
        }

        init();
    })();
</script>
</body>
</html>
